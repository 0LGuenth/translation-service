# -----------------------------------------
# Traefik: disable websecure read timeout so large image-layer pushes
# to the in-cluster registry don't get cut off mid-upload.
# -----------------------------------------
- name: Configure Traefik with registry-safe timeouts
  when: k3s_role == 'server'
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_root }}"
    definition:
      apiVersion: helm.cattle.io/v1
      kind: HelmChartConfig
      metadata:
        name: traefik
        namespace: kube-system
      spec:
        valuesContent: |
          ports:
            websecure:
              transport:
                respondingTimeouts:
                  readTimeout: 0

# -----------------------------------------
# Label nodes and prepare for workloads
# -----------------------------------------

# Discover all cluster nodes so the steps below work with any node names
- name: Get all cluster nodes
  when: k3s_role == 'server'
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
    kubeconfig: "{{ kubeconfig_root }}"
  register: cluster_nodes

# Remove NoSchedule taint from control-plane nodes so they schedule workloads
- name: Remove NoSchedule taint from control-plane nodes
  when: k3s_role == 'server'
  ansible.builtin.command: kubectl taint node {{ item }}
    node-role.kubernetes.io/control-plane:NoSchedule-
  environment:
    KUBECONFIG: "{{ kubeconfig_root }}"
  loop: "{{ cluster_nodes.resources
    | selectattr('metadata.labels.node-role.kubernetes.io/control-plane', 'defined')
    | map(attribute='metadata.name') | list }}"
  register: taint_result
  changed_when: taint_result.rc == 0
  failed_when: taint_result.rc not in [0, 1]

# Node labels — one simulated availability zone per node (region-a, region-b, ...)
- name: Label each node with its own availability zone
  when: k3s_role == 'server'
  kubernetes.core.k8s:
    state: patched
    api_version: v1
    kind: Node
    name: "{{ item }}"
    definition:
      metadata:
        labels:
          topology.kubernetes.io/zone: "region-{{ 'abc'[zone_index % 3] }}"
    kubeconfig: "{{ kubeconfig_root }}"
  loop: "{{ cluster_nodes.resources | map(attribute='metadata.name') | list }}"
  loop_control:
    index_var: zone_index

# -----------------------------------------
# In-cluster image registry
# -----------------------------------------

- name: Deploy registry Deployment and Service
  when: k3s_role == 'server'
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_root }}"
    definition:
      - apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: registry
          namespace: default
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: registry
          template:
            metadata:
              labels:
                app: registry
            spec:
              containers:
                - name: registry
                  image: registry:2
                  ports:
                    - containerPort: 5000
      - apiVersion: v1
        kind: Service
        metadata:
          name: registry
          namespace: default
        spec:
          selector:
            app: registry
          ports:
            - port: 5000
              targetPort: 5000

# k3s deploys Traefik asynchronously via the Helm controller after start, so on
# the first run the traefik.io CRDs may not be registered yet. Wait for the
# Middleware CRD to be Established before creating a Middleware resource.
- name: Wait for Traefik Middleware CRD to be established
  when: k3s_role == 'server'
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_root }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: middlewares.traefik.io
  register: traefik_mw_crd
  until: >-
    traefik_mw_crd.resources | length > 0
    and (traefik_mw_crd.resources[0].status.conditions | default([])
         | selectattr('type', 'equalto', 'Established')
         | selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 30
  delay: 10

# maxRequestBodyBytes: 0 = no limit; memRequestBodyBytes spills to disk
# beyond that threshold so large image layers don't exhaust pod memory.
- name: Create registry unlimited body size Middleware
  when: k3s_role == 'server'
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_root }}"
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: registry-body-size
        namespace: default
      spec:
        buffering:
          maxRequestBodyBytes: 0
          memRequestBodyBytes: 10485760

- name: Create registry Ingress with TLS
  when: k3s_role == 'server'
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_root }}"
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: registry
        namespace: default
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: default-registry-body-size@kubernetescrd
      spec:
        rules:
          - host: "registry.{{ rfc2136_zone }}"
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: registry
                      port:
                        number: 5000
        # No secretName → Traefik serves the host via its default wildcard cert
        tls:
          - hosts:
              - "registry.{{ rfc2136_zone }}"

- name: Configure k3s registry mirror
  become: true
  when: k3s_role == 'server'
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/registries.yaml
    mode: "0644"
    content: |
      mirrors:
        "registry.{{ rfc2136_zone }}":
          endpoint:
            - "https://registry.{{ rfc2136_zone }}"
  notify: Restart k3s
